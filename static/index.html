<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AI-Karaoke Pro</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/editor.css"> <!-- ВРЕЗКА РЕДАКТОРА -->
</head>
<body>

<div class="app-container">

    <main class="main-layout" id="main-layout">

        <!-- ═══════════════════════════════════════════ МЕДИАТЕКА -->
        <section id="library-box" class="panel library-panel">
            <div class="library-header">

                <!-- Строка 1: заголовок + кнопки -->
                <div class="lh-row">
                    <h2>Медиатека</h2>

                    <div class="lh-group">
                        <label class="btn btn-surface btn-icon lh-element" for="audio-files" title="Загрузить треки">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 5v14M5 12h14"/>
                            </svg>
                        </label>
                        <input type="file" id="audio-files" accept="audio/*" multiple style="display:none;">

                        <button id="cancel-btn" class="btn btn-danger-soft btn-icon lh-element" title="Отменить обработку">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"/>
                                <line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>

                    <div class="lh-group library-stats">
                        <div class="stat-item lh-element" title="Уникальных артистов">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            <span id="stat-artists">0</span>
                        </div>
                        <div class="stat-item lh-element" title="Готовых треков">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 18V5l12-2v13"/>
                                <circle cx="6" cy="18" r="3"/>
                                <circle cx="18" cy="16" r="3"/>
                            </svg>
                            <span id="stat-tracks">0</span>
                        </div>
                    </div>

                    <div class="lh-group actions">
                        <button id="scan-btn" class="btn btn-icon btn-surface lh-element" title="Сканировать библиотеку">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                            </svg>
                        </button>
                        <button id="clear-btn" class="btn btn-icon btn-danger-soft lh-element" title="Очистить всё">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- ═══ СТРОКА СОСТОЯНИЯ ═══ -->
                <div id="app-status-bar" class="app-status-bar">
                    <div class="app-status-content">
                        <span class="app-status-spinner" id="app-status-spinner" style="display:none;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                                <path d="M21 12a9 9 0 11-6.219-8.56"/>
                            </svg>
                        </span>
                        <span class="app-status-text" id="app-status-text"></span>
                        <div class="app-status-progress" id="app-status-progress" style="display:none;">
                            <div class="app-status-progress-fill" id="app-status-progress-fill"></div>
                        </div>
                    </div>
                </div>

                <!-- Строка 2: поиск + сортировка -->
                <div class="lh-row filters">
                    <div class="search-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="search-input" placeholder="Поиск (трек, артист, текст)...">
                        <button id="search-clear-btn" class="clear-search" style="display:none;" title="Очистить">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"/>
                                <line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>

                    <div class="sort-box">
                        <button id="sort-by-btn" class="sort-toggle" data-sort="artist" title="Сменить сортировку">
                            <svg id="icon-artist" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            <svg id="icon-title" style="display:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 18V5l12-2v13"/>
                                <circle cx="6" cy="18" r="3"/>
                                <circle cx="18" cy="16" r="3"/>
                            </svg>
                            <span id="sort-text-label">Артист</span>
                            <svg class="st-hint" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17 1l4 4-4 4"/>
                                <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                                <path d="M7 23l-4-4 4-4"/>
                                <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                            </svg>
                        </button>
                        <button id="sort-dir-btn" class="sort-dir" data-dir="asc" title="Направление сортировки">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 5v14M19 12l-7 7-7-7"/>
                            </svg>
                        </button>
                    </div>
                </div>

            </div><!-- /library-header -->

            <div id="tracks-list"></div>
        </section>

        <!-- ═══════════════════════════════════════════ ПЛЕЕР -->
        <section id="karaoke-container" class="panel player-panel">
            <div class="lyrics-wrapper" id="lyrics-wrapper">

                <!-- Обложка (левый верхний угол) -->
                <img id="cover-img" class="top-left-cover"
                     src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='%2394a3b8' viewBox='0 0 24 24'%3E%3Cpath d='M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z'/%3E%3C/svg%3E"
                     alt="Cover">

                <!-- ВРЕЗКА РЕДАКТОРА: Кнопки управления -->
                <div class="editor-controls-wrapper">
                    <button class="editor-btn edit-start" id="edit-start-btn" title="Режим редактора">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        Редактировать
                    </button>
                    <button class="editor-btn edit-apply" id="edit-apply-btn" title="Применить и пересчитать">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        Применить
                    </button>
                    <button class="editor-btn edit-cancel" id="edit-cancel-btn" title="Отменить изменения">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>

                <!-- Кнопка полноэкранного режима -->
                <button class="fs-btn" id="fs-btn" title="На весь экран">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M5 5h5v2H7v3H5V5zm9 0h5v5h-2V7h-3V5zm5 14h-5v-2h3v-3h2v5zm-14 0v-5h2v3h3v2H5z"/>
                    </svg>
                </button>

                <!-- Фоновое изображение -->
                <div class="bg-slide" id="bg-img-1"></div>
                <div class="lyrics-overlay"></div>

                <!-- Текст караоке -->
                <lyrics-display id="lyrics-display"></lyrics-display>

                <!-- ── Плавающая панель управления ── -->
                <div class="floating-control-panel">

                    <!-- Строка 1: play/stop + таймлайн -->
                    <div class="fcp-row-top">
                        <div class="fcp-buttons">
                            <button id="play-btn" class="seek-btn" title="Play / Pause">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            </button>
                            <button id="stop-btn" class="seek-btn" title="Stop">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
                            </button>
                        </div>
                        <div class="fcp-timeline">
                            <span id="time-current" class="time-label">0:00</span>
                            <input type="range" id="seek-bar" class="seek-bar-range" min="0" value="0" step="0.1">
                            <span id="time-total" class="time-label">0:00</span>
                        </div>
                    </div>

                    <!-- Строка 2: мета + микшер -->
                    <div class="fcp-row-bottom">
                        <div class="fcp-meta-text">
                            <div class="fcp-title"  id="cv-title"  title="Трек не выбран">Трек не выбран</div>
                            <div class="fcp-artist" id="cv-artist" title="Артист не выбран">Артист не выбран</div>
                        </div>

                        <div class="fcp-vol-col">
                            <div class="control-item" title="Громкость музыки (двойной клик — сброс)">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9 18V5l12-2v13"/>
                                    <circle cx="6" cy="18" r="3"/>
                                    <circle cx="18" cy="16" r="3"/>
                                </svg>
                                <div class="range-wrapper">
                                    <input type="range" id="vol-inst" min="0" max="1" step="0.05" value="1">
                                    <div class="range-thumb-val" id="lbl-inst">100%</div>
                                </div>
                            </div>
                            <div class="control-item" title="Громкость вокала (двойной клик — сброс)">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                    <line x1="12" y1="19" x2="12" y2="23"/>
                                    <line x1="8"  y1="23" x2="16" y2="23"/>
                                </svg>
                                <div class="range-wrapper">
                                    <input type="range" id="vol-voc" min="0" max="1" step="0.05" value="0.2">
                                    <div class="range-thumb-val" id="lbl-voc">20%</div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div><!-- /floating-control-panel -->

            </div><!-- /lyrics-wrapper -->

            <!-- ═══════════════════════════════════════════ OVERLAY: Редактирование метаданных (внутри плеера) -->
            <div id="metadata-overlay" class="meta-overlay" style="display: none;">
                <div class="meta-panel">
                    <div class="meta-header">
                        <h2>✏️ Редактирование метаданных</h2>
                        <button id="meta-close-btn" class="meta-close-btn" title="Закрыть (Escape)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>

                    <div class="meta-body">
                        <!-- Название и артист -->
                        <div class="meta-row">
                            <label for="meta-title-input">Название</label>
                            <input type="text" id="meta-title-input" class="meta-input" placeholder="Название трека">
                        </div>
                        <div class="meta-row">
                            <label for="meta-artist-input">Исполнитель</label>
                            <input type="text" id="meta-artist-input" class="meta-input" placeholder="Исполнитель">
                        </div>

                        <!-- Текст песни -->
                        <div class="meta-row meta-lyrics-row">
                            <label for="meta-lyrics-input">Текст песни</label>
                            <div class="meta-textarea-wrapper" id="meta-textarea-wrapper">
                                <textarea id="meta-lyrics-input" class="meta-textarea" placeholder="Текст песни…"></textarea>
                            </div>
                        </div>

                        <!-- Тумблер перескана -->
                        <div class="meta-row meta-toggle-row">
                            <label class="meta-toggle-label">
                                <input type="checkbox" id="meta-rescan-toggle">
                                <span class="meta-toggle-slider"></span>
                                <span class="meta-toggle-text">Пересканировать тайминги</span>
                            </label>
                            <div id="meta-rescan-hint" class="meta-hint" style="display: none;">
                                Тайминги будут пересчитаны. Это может занять некоторое время.
                            </div>
                        </div>

                        <!-- Обложки -->
                        <div class="meta-divider"><span>Обложки</span></div>

                        <!-- Обложка трека -->
                        <div class="meta-cover-section">
                            <div class="meta-cover-header">
                                <span>Обложка трека</span>
                                <button id="meta-reset-cover-btn" class="meta-reset-btn" title="Вернуть обложку от Genius">↺ Сбросить</button>
                            </div>
                            <div class="meta-cover-body" id="meta-cover-dropzone">
                                <div class="meta-cover-inputs">
                                    <input type="text" id="meta-cover-url" class="meta-input meta-url-input" placeholder="URL изображения или перетащите файл сюда">
                                    <button id="meta-cover-file-btn" class="meta-file-btn" title="Загрузить файл">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                    </button>
                                    <input type="file" id="meta-cover-file-input" accept="image/*" style="display:none;">
                                </div>
                                <img id="meta-cover-preview" class="meta-cover-preview" src="" alt="Превью">
                            </div>
                        </div>

                        <!-- Фон плеера -->
                        <div class="meta-cover-section">
                            <div class="meta-cover-header">
                                <span>Фон плеера</span>
                                <button id="meta-reset-bg-btn" class="meta-reset-btn" title="Вернуть фон от Genius">↺ Сбросить</button>
                            </div>
                            <div class="meta-cover-body" id="meta-bg-dropzone">
                                <div class="meta-cover-inputs">
                                    <input type="text" id="meta-bg-url" class="meta-input meta-url-input" placeholder="URL изображения или перетащите файл сюда">
                                    <button id="meta-bg-file-btn" class="meta-file-btn" title="Загрузить файл">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                    </button>
                                    <input type="file" id="meta-bg-file-input" accept="image/*" style="display:none;">
                                </div>
                                <img id="meta-bg-preview" class="meta-cover-preview" src="" alt="Превью">
                            </div>
                        </div>
                    </div>

                    <!-- Футер с кнопками -->
                    <div class="meta-footer">
                        <button id="meta-save-btn" class="meta-save-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                            <span>Сохранить</span>
                        </button>
                        <button id="meta-cancel-btn" class="meta-cancel-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            <span>Отмена</span>
                        </button>
                    </div>
                </div>
            </div>

        </section>

    </main>
</div>

<script src="/static/script.js"></script>
<script src="/static/editor.js"></script> <!-- ВРЕЗКА РЕДАКТОРА -->
</body>
</html>
